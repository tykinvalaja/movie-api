spring:
  application:
    name: movie-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: movie_schema
    create-schemas: true
    default-schema: movie_schema
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: movie_schema
